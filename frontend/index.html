<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Workday Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 340px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,.15);
      text-align: center;
    }

    .header {
      background: #4f46e5;
      color: white;
      padding: 25px 20px;
    }

    .content {
      padding: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .start { background: #4f46e5; color: white; }
    .end { background: #f43f5e; color: white; margin-top: 15px; }

    .badge {
      background: #e6f9ed;
      color: #16a34a;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      display: inline-block;
      margin-bottom: 15px;
    }

    .timer {
      font-size: 42px;
      font-weight: 800;
      margin: 10px 0;
    }

    .success {
      background: #e8fbf2;
      border-radius: 12px;
      padding: 20px;
      color: #15803d;
      margin-bottom: 20px;
    }

    .hidden { display: none !important; }
    
    /* Forzar visibilidad cuando se muestra */
    .view-visible {
      display: block !important;
    }
  </style>
</head>

<body>
<div class="card">

  <div class="header">
    ⏱️
    <h2>WORKDAY TRACKER</h2>
    <small>CONTROL DE ASISTENCIA</small>
  </div>

  <!-- PANTALLA 1 -->
  <div class="content" id="view-start">
    <label style="display: block; text-align: left; margin-bottom: 8px; color: #333; font-weight: 600;">DOCUMENTO / CÉDULA</label>
    <input id="code" placeholder="Ingresa tu ID único" style="margin-bottom: 20px;">
    <button type="button" class="start" id="btnStart">▶ INICIAR JORNADA</button>
  </div>

  <!-- PANTALLA 2 -->
  <div class="content hidden" id="view-work">
    <div class="badge">🟢 LABORANDO: <span id="user-code"></span></div>
    <div class="timer" id="timer">00:00:00</div>
    <button type="button" class="end" id="btnEnd">⬛ TERMINAR JORNADA</button>
  </div>

  <!-- PANTALLA 3 -->
  <div class="content hidden" id="view-end">
    <div class="success">
      ✅ <strong>¡Buen trabajo!</strong><br>
      JORNADA FINALIZADA CON ÉXITO
    </div>
    <p style="margin: 10px 0;"><strong>USUARIO:</strong> <span id="final-user" style="color: #4f46e5;"></span></p>
    <p style="margin: 10px 0;"><strong>TIEMPO LABORADO:</strong> <span id="final-time" style="color: #4f46e5;"></span></p>
    <p style="margin: 15px 0; color: #666; font-size: 14px;">Usted ha laborado <span id="final-time-text"></span>, muchas gracias.</p>
    <button type="button" class="start" onclick="location.reload()">VOLVER AL INICIO</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
